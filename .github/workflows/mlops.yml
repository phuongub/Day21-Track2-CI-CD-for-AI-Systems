name: MLOps Pipeline

on:
  push:
    branches: [master]
    paths:
      - 'data/**.dvc'
      - 'src/**.py'
      - 'params.yaml'
  workflow_dispatch:

jobs:

  test:
    name: Unit Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run unit tests
        run: pytest tests/ -v

  train:
    name: Train
    needs: test
    runs-on: ubuntu-latest
    outputs:
      accuracy: ${{ steps.read_metrics.outputs.accuracy }}
    env:
      AWS_DEFAULT_REGION: us-east-1

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure AWS credentials
        id: aws_creds
        run: |
          cat <<'PYEOF' > /tmp/setup_aws.py
          import json, os, sys
          raw = os.environ.get('CLOUD_CREDS_JSON', '')
          if not raw:
              print("ERROR: CLOUD_CREDS_JSON is empty", file=sys.stderr)
              sys.exit(1)
          try:
              d = json.loads(raw)
          except Exception as e:
              print(f"ERROR: Invalid JSON: {e}", file=sys.stderr)
              sys.exit(1)
          ak = d.get('aws_access_key_id', '')
          sk = d.get('aws_secret_access_key', '')
          if not ak or not sk:
              print("ERROR: Missing keys in JSON", file=sys.stderr)
              sys.exit(1)
          # Write to GITHUB_ENV
          env_file = os.environ.get('GITHUB_ENV', '')
          if env_file:
              with open(env_file, 'a') as f:
                  f.write(f'AWS_ACCESS_KEY_ID={ak}\n')
                  f.write(f'AWS_SECRET_ACCESS_KEY={sk}\n')
                  f.write('AWS_DEFAULT_REGION=us-east-1\n')
              print(f"Wrote to GITHUB_ENV: {env_file}")
          else:
              print("WARNING: GITHUB_ENV not set", file=sys.stderr)
          # Write ~/.aws/credentials
          aws_dir = os.path.expanduser('~/.aws')
          os.makedirs(aws_dir, exist_ok=True)
          creds_path = os.path.join(aws_dir, 'credentials')
          with open(creds_path, 'w') as f:
              f.write('[default]\n')
              f.write(f'aws_access_key_id = {ak}\n')
              f.write(f'aws_secret_access_key = {sk}\n')
          print(f"Wrote to {creds_path}")
          print(f"Key lengths: AK={len(ak)} SK={len(sk)}")
          PYEOF
          python3 /tmp/setup_aws.py
        env:
          CLOUD_CREDS_JSON: ${{ secrets.CLOUD_CREDENTIALS }}

      - name: Verify AWS credentials
        run: |
          echo "AK length: ${#AWS_ACCESS_KEY_ID}"
          echo "SK length: ${#AWS_SECRET_ACCESS_KEY}"
          echo "Region: $AWS_DEFAULT_REGION"
          ls -la ~/.aws/credentials || true
          cat ~/.aws/credentials | head -1 || true

      - name: Pull data with DVC
        run: dvc pull data/train_phase1.csv data/eval.csv

      - name: Train model
        run: python src/train.py

      - name: Read metrics
        id: read_metrics
        run: |
          ACC=$(python3 -c "import json; d=json.load(open('outputs/metrics.json')); print(d['accuracy'])")
          echo "accuracy=$ACC" >> $GITHUB_OUTPUT

      - name: Upload model to S3
        run: |
          python3 - <<'EOF'
          import boto3, os
          s3 = boto3.client("s3")
          bucket = os.environ["S3_BUCKET"]
          s3.upload_file("models/model.pkl", bucket, "models/latest/model.pkl")
          print("Model uploaded to s3://" + bucket + "/models/latest/model.pkl")
          EOF
        env:
          S3_BUCKET: ${{ secrets.CLOUD_BUCKET }}

      - name: Save metrics as artifact
        uses: actions/upload-artifact@v4
        with:
          name: metrics
          path: outputs/metrics.json

  eval:
    name: Eval
    needs: train
    runs-on: ubuntu-latest
    steps:
      - name: Check eval gate
        run: |
          python3 - <<'EOF'
          acc = float("${{ needs.train.outputs.accuracy }}")
          if acc < 0.70:
              raise SystemExit(f"FAILED: accuracy {acc:.4f} < 0.70. Huy deploy.")
          print(f"PASSED: accuracy {acc:.4f} >= 0.70. Dang trien khai model.")
          EOF

  deploy:
    name: Deploy
    needs: eval
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy to VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            sudo systemctl restart mlops-serve
            sleep 5
            curl -sf http://localhost:8000/health && echo "Health check passed." || exit 1
