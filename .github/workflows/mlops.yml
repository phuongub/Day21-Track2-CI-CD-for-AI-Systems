name: MLOps Pipeline

on:
  push:
    branches: [master]
    paths:
      - 'data/**.dvc'
      - 'src/**.py'
      - 'params.yaml'
  workflow_dispatch:

jobs:

  test:
    name: Unit Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run unit tests
        run: pytest tests/ -v

  train:
    name: Train
    needs: test
    runs-on: ubuntu-latest
    outputs:
      accuracy: ${{ steps.read_metrics.outputs.accuracy }}
    env:
      AWS_DEFAULT_REGION: us-east-1

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure AWS credentials
        id: aws_creds
        run: |
          python3 -c "
          import json, os, sys
          raw = os.environ['CLOUD_CREDS_JSON']
          try:
              d = json.loads(raw)
              ak = d['aws_access_key_id']
              sk = d['aws_secret_access_key']
          except Exception as e:
              print('ERROR parsing JSON:', e, file=sys.stderr)
              sys.exit(1)
          # Write to GITHUB_ENV so subsequent steps pick them up
          with open(os.environ['GITHUB_ENV'], 'a') as f:
              f.write(f'AWS_ACCESS_KEY_ID={ak}\n')
              f.write(f'AWS_SECRET_ACCESS_KEY={sk}\n')
          # Also write ~/.aws/credentials for DVC/boto3 fallback
          os.makedirs(os.path.expanduser('~/.aws'), exist_ok=True)
          with open(os.path.expanduser('~/.aws/credentials'), 'w') as f:
              f.write('[default]\n')
              f.write(f'aws_access_key_id = {ak}\n')
              f.write(f'aws_secret_access_key = {sk}\n')
          print(f'Key extracted, length={len(ak)} chars')
          print('AWS credentials configured successfully')
          "
        env:
          CLOUD_CREDS_JSON: ${{ secrets.CLOUD_CREDENTIALS }}

      - name: Pull data with DVC
        run: dvc pull data/train_phase1.csv data/eval.csv

      - name: Train model
        run: python src/train.py

      - name: Read metrics
        id: read_metrics
        run: |
          ACC=$(python3 -c "import json; d=json.load(open('outputs/metrics.json')); print(d['accuracy'])")
          echo "accuracy=$ACC" >> $GITHUB_OUTPUT

      - name: Upload model to S3
        run: |
          python3 - <<'EOF'
          import boto3, os
          s3 = boto3.client("s3")
          bucket = os.environ["S3_BUCKET"]
          s3.upload_file("models/model.pkl", bucket, "models/latest/model.pkl")
          print("Model uploaded to s3://" + bucket + "/models/latest/model.pkl")
          EOF
        env:
          S3_BUCKET: ${{ secrets.CLOUD_BUCKET }}

      - name: Save metrics as artifact
        uses: actions/upload-artifact@v4
        with:
          name: metrics
          path: outputs/metrics.json

  eval:
    name: Eval
    needs: train
    runs-on: ubuntu-latest
    steps:
      - name: Check eval gate
        run: |
          python3 - <<'EOF'
          acc = float("${{ needs.train.outputs.accuracy }}")
          if acc < 0.70:
              raise SystemExit(f"FAILED: accuracy {acc:.4f} < 0.70. Huy deploy.")
          print(f"PASSED: accuracy {acc:.4f} >= 0.70. Dang trien khai model.")
          EOF

  deploy:
    name: Deploy
    needs: eval
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy to VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            sudo systemctl restart mlops-serve
            sleep 5
            curl -sf http://localhost:8000/health && echo "Health check passed." || exit 1
